[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # These Firebase vars are intentionally public (used by the client-side Firebase SDK).
  # They are remapped from PUBLIC_FIREBASE_* to NEXT_PUBLIC_FIREBASE_* in next.config.mjs
  # and get inlined into the bundle — this is expected behaviour, not a leak.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_DATABASE_URL,PUBLIC_FIREBASE_DATABASE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
